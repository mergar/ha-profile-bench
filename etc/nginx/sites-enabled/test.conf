server {
#        listen *:8080 default_server;

	listen 127.0.0.1:8080 default_server reuseport backlog=16384 accept_filter=httpready;	# reuseport: Позволяет ядру распределять входящие соединения по воркерам более эффективно.

	# для SSL - accept_filter=dataready
	# server { listen 443 ssl accept_filter=dataready; server_name example.com; ... }

# backlog засинхрить с kern.ipc.soacceptqueue ?
#kern.ipc.soacceptqueue    16384
# kern.ipc.soacceptqueue: 10240
# backlog=4096

        error_log /dev/null;
        access_log off;

        server_name _;

#        location / {
#                root /usr/local/www/tmpfs;
#                allow all;
#        }

	location = /index.html {
		default_type text/html;
		return 200 '<!DOCTYPE html>
<html>
<head>
<title>Welcome to nginx!</title>
<style>
html { color-scheme: light dark; }
body { width: 35em; margin: 0 auto;
font-family: Tahoma, Verdana, Arial, sans-serif; }
</style>
</head>
<body>
<h1>Welcome to nginx!</h1>
<p>If you see this page, the nginx web server is successfully installed and
working. Further configuration is required.</p>
<p>For online documentation and support please refer to
<a href="http://nginx.org/">nginx.org</a>.<br/>
Commercial support is available at
<a href="http://nginx.com/">nginx.com</a>.</p>
<p><em>Thank you for using nginx.</em></p>
</body>
</html>';
	}

}
