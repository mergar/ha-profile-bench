user www; # или nginx
#worker_processes auto; # аналог nbthread
worker_processes 1; # аналог nbthread
worker_rlimit_nofile 200000; # аналог global maxconn

events {
    worker_connections 2048; # суммарно будет около maxconn frontend
    multi_accept on;
    use kqueue; # для FreeBSD
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Оптимизации сети (аналоги tune.bufsize и tcp-nodelay)
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on; # прямой аналог http-no-delay

    keepalive_timeout  65;
    proxy_buffers 8 16k; # аналог tune.bufsize

    # Лимиты (аналог stick-table и dynamic_limits)
    # 10m хватит примерно на 160к IP-адресов (больше, чем 100k в HAProxy)
    limit_req_zone $binary_remote_addr zone=dynamic_limits:10m rate=10r/s; 
    # rate 10r/s за 10 секунд даст те же 100 запросов

    server {
        listen 127.0.0.1:81; # defer-accept во FreeBSD включается в listen как accept_filter=dataready
        server_name zx.convectix.com;

        # Обработка лимитов (аналог http-request deny)
        limit_req zone=dynamic_limits burst=100 nodelay;
        limit_req_status 429;

        location / {
            proxy_pass http://127.0.0.1:8080;
            
            # Настройки keep-alive до бэкенда
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Аналог prometheus_metrics
        location /metrics {
            stub_status; # базовые метрики (для полного Prometheus нужен модуль vts)
            allow 127.0.0.1;
            # deny all;
        }
    }

    # Аналог listen stats (только через stub_status)
    server {
        listen 9001;
        location /haproxy_stats {
            stub_status;
        }
    }
}


