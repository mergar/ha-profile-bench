user nobody;
worker_processes 1;

events {
    worker_connections 10240;
    use epoll;
}

http {
#    access_log off;
#    error_log /dev/null emerg;
	access_log /var/log/nginx.acc;
	error_log /var/log/nginx.err emerg;

    server {
        # Слушаем 443 порт с поддержкой SSL
        listen 1443 ssl;
	access_log /var/log/nginx/nginx.acc;
	error_log /var/log/nginx/nginx.err emerg;



        # Пути к вашим файлам
        ssl_certificate     /root/gen_certs/server.crt;
        ssl_certificate_key /root/gen_certs/server.key;

        # Рекомендуемые настройки безопасности
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
# 
#        keepalive_requests 0;
# если оставнить 0, haproxy дает RPS 33.54 и No free ports
# а 300s дает: 1359.62 RPS !
keepalive_timeout 300s;  # Должно совпадать или быть больше timeout http-keep-alive в HAProxy
keepalive_requests 1000000; # Разрешить миллион запросов внутри одного TCP-соединения

        location /index.html {
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
